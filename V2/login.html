<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>登录 · CSU Date</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+SC:wght@200;400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{--ink:oklch(18% 0.09 275);--ink-hex:#111148;--ink-soft:oklch(30% 0.08 275);--coral:oklch(48% 0.17 28);--coral-hex:#b5391a;--coral-warm:oklch(55% 0.15 30);--gold:oklch(72% 0.12 75);--gold-hex:#c2983a;--gold-soft:oklch(88% 0.06 80);--sage:oklch(65% 0.08 155);--sage-hex:#6a9e72;--cream:#f9f5eb;--cream-mid:#f0ebe0;--cream-deep:#e6e0d3;--cream-rose:oklch(96% 0.012 30);--text:#1e1d18;--text-dim:#6d6a62;--text-ghost:#a8a39a;--white-warm:#fffdf7}
*,*::before,*::after{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;font-size:16px}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
::selection{background:oklch(48% 0.17 28/0.12)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}

/* ── Layout ── */
.login-shell{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;min-height:100dvh}

/* ── Brand Panel ── */
.brand-panel{position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(2rem,5vw,4rem);overflow:hidden;background:radial-gradient(ellipse at 30% 70%,oklch(95% 0.02 30) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,oklch(95% 0.015 250) 0%,transparent 45%),var(--cream-mid)}
.brand-watermark{position:absolute;font-family:'Noto Serif SC',serif;font-weight:200;font-size:clamp(14rem,28vw,22rem);line-height:.85;color:oklch(18% 0.09 275/0.035);pointer-events:none;user-select:none;right:-8%;top:6%;animation:watermarkFloat 18s ease-in-out infinite alternate}
@keyframes watermarkFloat{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-8px,6px) rotate(-1deg)}}
.brand-deco{position:absolute;top:clamp(2rem,5vw,4rem);left:clamp(2rem,5vw,4rem);display:flex;align-items:center;gap:.75rem}
.brand-deco-line{width:2rem;height:2px;background:linear-gradient(90deg,var(--coral-hex),transparent);animation:lineExpand 1.2s cubic-bezier(.16,1,.3,1) .4s both}
@keyframes lineExpand{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
.brand-eyebrow{font-size:.625rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:var(--coral-hex)}
.brand-content{position:relative;z-index:1;max-width:28rem}
.brand-tagline{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(2rem,4.5vw,3.25rem);line-height:1.15;color:var(--ink-hex);letter-spacing:-.02em;margin-bottom:1.5rem;opacity:0;animation:slideUp .7s cubic-bezier(.16,1,.3,1) .2s forwards}
.brand-tagline em{font-style:normal;color:var(--coral-hex)}
.brand-desc{color:var(--text-dim);font-size:.9375rem;line-height:1.85;font-weight:350;max-width:24ch;opacity:0;animation:slideUp .7s cubic-bezier(.16,1,.3,1) .4s forwards}
.brand-stat{display:inline-flex;align-items:center;gap:.5rem;margin-top:2rem;padding:.5rem 1rem .5rem .75rem;background:var(--white-warm);border-radius:9999px;opacity:0;animation:slideUp .7s cubic-bezier(.16,1,.3,1) .55s forwards}
.brand-stat .pulse{width:7px;height:7px;border-radius:50%;background:var(--sage-hex);box-shadow:0 0 0 0 rgba(106,158,114,.35);animation:pulseRing 2s cubic-bezier(.4,0,.2,1) infinite}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(106,158,114,.35)}70%{box-shadow:0 0 0 6px rgba(106,158,114,0)}100%{box-shadow:0 0 0 0 rgba(106,158,114,0)}}
.brand-stat span{font-size:.8125rem;color:var(--text-dim);font-weight:500}
.brand-stat strong{font-weight:700;color:var(--ink-hex);font-variant-numeric:tabular-nums}
@keyframes slideUp{from{opacity:0;transform:translateY(1rem)}to{opacity:1;transform:none}}

/* ── Floating Shapes ── */
.shape{position:absolute;border-radius:50%;pointer-events:none;opacity:.06}
.shape-1{width:clamp(12rem,30vw,24rem);aspect-ratio:1;background:var(--coral-hex);top:-8%;left:-12%;animation:shapeFloat 22s ease-in-out infinite alternate}
.shape-2{width:clamp(8rem,18vw,15rem);aspect-ratio:1;background:var(--ink-hex);bottom:10%;right:-6%;animation:shapeFloat 26s ease-in-out infinite alternate-reverse}
@keyframes shapeFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(10px,-15px) scale(1.04)}100%{transform:translate(-5px,10px) scale(.97)}}

/* ── Form Panel ── */
.form-panel{display:flex;align-items:center;justify-content:center;padding:clamp(2rem,5vw,4rem);background:var(--white-warm);overflow-y:auto}
.form-wrapper{width:100%;max-width:24rem}
.form-header{margin-bottom:clamp(1.5rem,3vw,2.5rem)}
.form-title{font-family:'Noto Serif SC',serif;font-weight:700;font-size:clamp(1.5rem,3vw,2rem);color:var(--ink-hex);margin-bottom:.375rem}
.form-subtitle{color:var(--text-ghost);font-size:.875rem;font-weight:400}

/* ── Input Groups ── */
.input-group{margin-bottom:1.25rem}
.input-label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.5rem}
.input-field{position:relative}
.input-field input,.input-field select{width:100%;padding:1rem 1rem 1rem 3rem;background:var(--cream);border:none;border-radius:1.25rem;font-family:'Outfit',sans-serif;font-size:.9375rem;color:var(--text);outline:none;transition:background .3s,box-shadow .3s;appearance:none;-webkit-appearance:none}
.input-field select{cursor:pointer;padding-right:2.5rem}
.input-field input::placeholder{color:var(--text-ghost);font-weight:350}
.input-field input:focus,.input-field select:focus{background:var(--cream-mid);box-shadow:0 0 0 2px oklch(18% 0.09 275/0.08)}
.input-field .field-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-ghost);font-size:1.125rem;transition:color .3s;pointer-events:none}
.input-field input:focus~.field-icon,.input-field input:not(:placeholder-shown)~.field-icon,.input-field select:focus~.field-icon{color:var(--ink-hex)}
.input-suffix{position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:.75rem;color:var(--text-ghost);font-weight:500;pointer-events:none}
.toggle-pw{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-ghost);cursor:pointer;padding:0;display:flex;transition:color .2s}
.toggle-pw:hover{color:var(--text)}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* ── Row Utils ── */
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.check-label{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.8125rem;color:var(--text-dim);font-weight:500;user-select:none}
.check-label input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:1.125rem;height:1.125rem;border-radius:.375rem;background:var(--cream);transition:background .2s,box-shadow .2s;cursor:pointer;position:relative;flex-shrink:0}
.check-label input[type="checkbox"]:checked{background:var(--ink-hex)}
.check-label input[type="checkbox"]:checked::after{content:'\2713';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--white-warm);font-size:.625rem;font-weight:700}
.forgot-link{font-size:.8125rem;color:var(--coral-hex);font-weight:500;text-decoration:none;position:relative}
.forgot-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--coral-hex);transition:width .4s cubic-bezier(.16,1,.3,1)}
.forgot-link:hover::after{width:100%}

/* ── Buttons ── */
.btn-login{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:1.125rem;border-radius:9999px;background:linear-gradient(135deg,var(--ink-hex),oklch(22% 0.12 275));color:var(--white-warm);font-family:'Outfit',sans-serif;font-weight:600;font-size:1rem;border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .4s ease;box-shadow:0 8px 32px oklch(18% 0.09 275/0.18)}
.btn-login::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 60%);pointer-events:none}
.btn-login:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 14px 44px oklch(18% 0.09 275/0.25)}
.btn-login:active{transform:scale(.98);transition-duration:.1s}
.btn-login .material-symbols-outlined{font-size:1.125rem;transition:transform .3s}
.btn-login:hover .material-symbols-outlined{transform:translateX(3px)}
.btn-login.loading{pointer-events:none}
.btn-login .spinner{display:inline-block;width:1.25rem;height:1.25rem;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error ── */
.form-error{display:none;align-items:center;gap:.5rem;padding:.75rem 1rem;border-radius:1rem;background:oklch(48% 0.17 28/0.06);color:var(--coral-hex);font-size:.8125rem;font-weight:500;margin-bottom:1.25rem}
.form-error.show{display:flex}
.form-error .material-symbols-outlined{font-size:1rem;flex-shrink:0}

/* ── Hidden groups ── */
.reg-fields{display:none}
.reg-fields.show{display:block}

/* ── Verification Code ── */
.code-row{display:grid;grid-template-columns:1fr auto;gap:.75rem;align-items:end}
.code-row .input-group{margin-bottom:0}
.btn-send-code{padding:.875rem 1.25rem;border-radius:1.25rem;background:var(--coral-hex);color:var(--white-warm);font-family:'Outfit',sans-serif;font-weight:600;font-size:.8125rem;border:none;cursor:pointer;white-space:nowrap;transition:background .2s,transform .2s;height:3.125rem;display:flex;align-items:center}
.btn-send-code:hover:not(:disabled){background:oklch(52% 0.15 30);transform:translateY(-1px)}
.btn-send-code:active:not(:disabled){transform:scale(.97)}
.btn-send-code:disabled{background:var(--cream-deep);color:var(--text-ghost);cursor:not-allowed}
.code-sent{display:none;align-items:center;gap:.375rem;font-size:.75rem;color:var(--sage-hex);font-weight:500;margin-top:.375rem}
.code-sent.show{display:flex}
.code-sent .material-symbols-outlined{font-size:.875rem}

/* ── Footer ── */
.form-footer{text-align:center;margin-top:2rem}
.form-footer p{font-size:.8125rem;color:var(--text-ghost)}
.form-footer a{color:var(--coral-hex);font-weight:600;text-decoration:none;cursor:pointer;position:relative}
.form-footer a::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:1px;background:var(--coral-hex);transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.form-footer a:hover::after{transform:scaleX(1);transform-origin:left}

/* ── Responsive ── */
@media(max-width:900px){
  .login-shell{grid-template-columns:1fr}
  .brand-panel{display:none}
  .form-panel{min-height:100vh;min-height:100dvh;background:radial-gradient(ellipse at 70% 20%,oklch(95% 0.02 30) 0%,transparent 50%),var(--cream)}
}
@media(max-width:420px){
  .form-wrapper{padding:0 .25rem}
  .input-row{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="login-shell">

  <!-- ─── Brand Panel ─── -->
  <div class="brand-panel">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="brand-watermark">遇</div>
    <div class="brand-deco">
      <span class="brand-deco-line"></span>
      <span class="brand-eyebrow">CSU Date</span>
    </div>
    <div class="brand-content">
      <h1 class="brand-tagline">不刷屏，<br>每周遇见<em>一个</em><br>对的人</h1>
      <p class="brand-desc">中南大学专属校园匹配平台。<br>填写问卷，每周四收到你的专属匹配。</p>
      <div class="brand-stat">
        <span class="pulse"></span>
        <span>本周活跃 <strong>2,847</strong> 位中南人</span>
      </div>
    </div>
  </div>

  <!-- ─── Form Panel ─── -->
  <div class="form-panel">
    <div class="form-wrapper">
      <div class="form-header">
        <h2 class="form-title" id="formTitle">欢迎回来</h2>
        <p class="form-subtitle" id="formSubtitle">登录你的 CSU Date 账户</p>
      </div>

      <form id="loginForm" onsubmit="handleSubmit(event)">
        <div class="form-error" id="formError">
          <span class="material-symbols-outlined">error</span>
          <span id="errorMsg">请填写完整的信息</span>
        </div>

        <!-- Registration-only fields -->
        <div class="reg-fields" id="regFields">
          <div class="input-group">
            <label class="input-label" for="regName">昵称</label>
            <div class="input-field">
              <input type="text" id="regName" placeholder="给自己取个昵称" autocomplete="nickname"/>
              <span class="material-symbols-outlined field-icon">badge</span>
            </div>
          </div>
          <div class="input-row" style="margin-bottom:1.25rem">
            <div class="input-group" style="margin-bottom:0">
              <label class="input-label" for="regCampus">校区</label>
              <div class="input-field">
                <select id="regCampus">
                  <option value="">选择校区</option>
                  <option>岳麓山校区</option>
                  <option>潇湘校区</option>
                  <option>南校区</option>
                  <option>天心校区</option>
                  <option>湘雅校区</option>
                </select>
                <span class="material-symbols-outlined field-icon">location_on</span>
              </div>
            </div>
            <div class="input-group" style="margin-bottom:0">
              <label class="input-label" for="regGrade">年级</label>
              <div class="input-field">
                <select id="regGrade">
                  <option value="">选择年级</option>
                  <option>大一</option>
                  <option>大二</option>
                  <option>大三</option>
                  <option>大四</option>
                  <option>研究生</option>
                </select>
                <span class="material-symbols-outlined field-icon">school</span>
              </div>
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="regMajor">专业</label>
            <div class="input-field">
              <input type="text" id="regMajor" placeholder="你的专业" autocomplete="organization"/>
              <span class="material-symbols-outlined field-icon">menu_book</span>
            </div>
          </div>
        </div>

        <!-- Shared fields -->
        <div class="input-group">
          <label class="input-label" for="email">学校邮箱</label>
          <div class="input-field">
            <input type="text" id="email" placeholder="你的学号" autocomplete="username" required/>
            <span class="material-symbols-outlined field-icon">mail</span>
            <span class="input-suffix">@csu.edu.cn</span>
          </div>
        </div>

        <!-- Verification code (register only) -->
        <div class="reg-fields" id="codeFields">
          <div class="code-row" style="margin-bottom:1.25rem">
            <div class="input-group">
              <label class="input-label" for="verifyCode">验证码</label>
              <div class="input-field">
                <input type="text" id="verifyCode" placeholder="输入 6 位验证码" maxlength="6" autocomplete="one-time-code" inputmode="numeric"/>
                <span class="material-symbols-outlined field-icon">pin</span>
              </div>
            </div>
            <button type="button" class="btn-send-code" id="sendCodeBtn" onclick="sendCode()">发送验证码</button>
          </div>
          <div class="code-sent" id="codeSent">
            <span class="material-symbols-outlined">check_circle</span>
            <span id="codeSentMsg">验证码已发送至你的邮箱</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="password">密码</label>
          <div class="input-field">
            <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" required/>
            <span class="material-symbols-outlined field-icon">lock</span>
            <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="切换密码可见性">
              <span class="material-symbols-outlined" id="pwIcon">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Login-only row -->
        <div class="form-row" id="loginExtras">
          <label class="check-label">
            <input type="checkbox" id="remember" name="remember"/>
            记住我
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span id="btnText">登录</span>
          <span class="material-symbols-outlined" id="btnIcon">arrow_forward</span>
        </button>
      </form>

      <div class="form-footer" id="formFooter">
        <p>还没有账户？<a onclick="toggleMode()">立即注册</a></p>
      </div>
    </div>
  </div>

</div>

<script>
let mode='login'; // 'login' or 'register'
const params=new URLSearchParams(location.search);
const redirectParam=params.get('redirect');

function togglePassword(){
  const pw=document.getElementById('password');
  const icon=document.getElementById('pwIcon');
  if(pw.type==='password'){pw.type='text';icon.textContent='visibility';}
  else{pw.type='password';icon.textContent='visibility_off';}
}

let generatedCode=null;
let codeTimer=null;
let codeCooldown=0;

function toggleMode(){
  mode=mode==='login'?'register':'login';
  document.getElementById('formError').classList.remove('show');
  const isReg=mode==='register';
  document.getElementById('formTitle').textContent=isReg?'创建账户':'欢迎回来';
  document.getElementById('formSubtitle').textContent=isReg?'注册 CSU Date，开启每周匹配':'登录你的 CSU Date 账户';
  document.getElementById('regFields').classList.toggle('show',isReg);
  document.getElementById('codeFields').classList.toggle('show',isReg);
  document.getElementById('loginExtras').style.display=isReg?'none':'flex';
  document.getElementById('btnText').textContent=isReg?'注册':'登录';
  document.getElementById('formFooter').innerHTML=isReg
    ?'<p>已有账户？<a onclick="toggleMode()">登录</a></p>'
    :'<p>还没有账户？<a onclick="toggleMode()">立即注册</a></p>';
  // Reset code state on mode switch
  generatedCode=null;
  document.getElementById('codeSent').classList.remove('show');
  if(codeTimer){clearInterval(codeTimer);codeTimer=null;}
  const sendBtn=document.getElementById('sendCodeBtn');
  sendBtn.disabled=false;
  sendBtn.textContent='发送验证码';
}

function sendCode(){
  const email=document.getElementById('email').value.trim();
  if(!email){
    showError('请先填写学号');
    return;
  }
  // Generate a 6-digit code (simulated)
  generatedCode=String(Math.floor(100000+Math.random()*900000));
  console.log('[CSU Date] 验证码已发送至 '+email+'@csu.edu.cn：'+generatedCode);

  // Show confirmation
  const sentEl=document.getElementById('codeSent');
  document.getElementById('codeSentMsg').textContent='验证码已发送至 '+email+'@csu.edu.cn（控制台查看）';
  sentEl.classList.add('show');

  // Start cooldown
  codeCooldown=60;
  const btn=document.getElementById('sendCodeBtn');
  btn.disabled=true;
  btn.textContent=codeCooldown+'s';
  codeTimer=setInterval(()=>{
    codeCooldown--;
    if(codeCooldown<=0){
      clearInterval(codeTimer);codeTimer=null;
      btn.disabled=false;
      btn.textContent='重新发送';
    }else{
      btn.textContent=codeCooldown+'s';
    }
  },1000);
}

function showError(msg){
  const errEl=document.getElementById('formError');
  document.getElementById('errorMsg').textContent=msg;
  errEl.classList.add('show');
}

function getRedirectUrl(user){
  if(redirectParam==='quiz') return 'index.html?startQuiz=true';
  if(redirectParam&&redirectParam!=='quiz') return decodeURIComponent(redirectParam);
  return user.quizCompleted?'dashboard.html':'index.html?startQuiz=true';
}

function handleSubmit(e){
  e.preventDefault();
  const errEl=document.getElementById('formError');
  const errMsg=document.getElementById('errorMsg');
  errEl.classList.remove('show');

  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('password').value;

  if(!email||!pw){
    errMsg.textContent='请填写完整的信息';
    errEl.classList.add('show');
    return;
  }

  // Test accounts
  // test/test = matched, test2/test = no match this week
  if(mode==='login'&&(email==='test'||email==='test2')&&pw==='test'){
    doSubmit({
      id:'8209190101',
      email:'8209190101@csu.edu.cn',
      name:'林晓霜',
      campus:'岳麓山校区',
      grade:'大三',
      major:'计算机科学与技术',
      bio:'喜欢在图书馆靠窗的位置看书，偶尔去岳麓山跑步。相信慢慢来，比较快。',
      values:['经世致用','共情力','独立思考','好奇心'],
      wechat:'xiaoshuang_csu',
      stats:{matches:email==='test'?12:3,bestScore:email==='test'?89:76,weeks:7},
      loggedIn:true,
      loginTime:Date.now(),
      quizCompleted:true,
      weeklyMatch:email==='test'
    });
    return;
  }

  if(mode==='register'){
    const name=document.getElementById('regName').value.trim();
    const campus=document.getElementById('regCampus').value;
    const grade=document.getElementById('regGrade').value;
    const major=document.getElementById('regMajor').value.trim();
    const code=document.getElementById('verifyCode').value.trim();
    if(!name||!campus||!grade||!major){
      errMsg.textContent='请填写所有注册信息';
      errEl.classList.add('show');
      return;
    }
    if(!generatedCode){
      errMsg.textContent='请先发送验证码';
      errEl.classList.add('show');
      return;
    }
    if(code!==generatedCode){
      errMsg.textContent='验证码错误，请重新输入';
      errEl.classList.add('show');
      return;
    }
    doSubmit({
      id:email,
      email:email+'@csu.edu.cn',
      name:name,
      campus:campus,
      grade:grade,
      major:major,
      bio:'',
      values:[],
      stats:{matches:0,bestScore:0,weeks:0},
      loggedIn:true,
      loginTime:Date.now(),
      quizCompleted:false
    });
  }else{
    // Login mode — simulated (no backend)
    const existing=localStorage.getItem('csudate_user');
    let user;
    if(existing){
      try{
        user=JSON.parse(existing);
        user.loggedIn=true;
        user.loginTime=Date.now();
        user.id=email;
        user.email=email+'@csu.edu.cn';
      }catch(e){user=null;}
    }
    if(!user){
      user={
        id:email,
        email:email+'@csu.edu.cn',
        name:'CSU Date 用户',
        campus:'岳麓山校区',
        grade:'大三',
        major:'',
        bio:'',
        values:[],
        stats:{matches:0,bestScore:0,weeks:0},
        loggedIn:true,
        loginTime:Date.now(),
        quizCompleted:false
      };
    }
    doSubmit(user);
  }
}

function doSubmit(user){
  // Save remember-me
  if(document.getElementById('remember').checked){
    localStorage.setItem('csudate_remember',document.getElementById('email').value.trim());
  }else{
    localStorage.removeItem('csudate_remember');
  }

  const btn=document.getElementById('submitBtn');
  btn.classList.add('loading');
  btn.innerHTML='<span class="spinner"></span>';

  localStorage.setItem('csudate_user',JSON.stringify(user));

  setTimeout(()=>{
    window.location.href=getRedirectUrl(user);
  },800);
}

// Auto-redirect if already logged in
(function(){
  const raw=localStorage.getItem('csudate_user');
  if(raw){
    try{
      const data=JSON.parse(raw);
      if(data.loggedIn){
        window.location.href=getRedirectUrl(data);
        return;
      }
    }catch(e){}
  }
  // Restore remembered email
  const remembered=localStorage.getItem('csudate_remember');
  if(remembered){
    document.getElementById('email').value=remembered;
    document.getElementById('remember').checked=true;
  }
  // Auto-switch to register mode if redirect=quiz (likely new user)
  if(redirectParam==='quiz'&&!raw){
    toggleMode();
  }
})();
</script>
