<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>打个招呼 · CSU Date</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+SC:wght@200;400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{--ink:oklch(18% 0.09 275);--ink-hex:#111148;--ink-soft:oklch(30% 0.08 275);--coral:oklch(48% 0.17 28);--coral-hex:#b5391a;--coral-warm:oklch(55% 0.15 30);--gold:oklch(72% 0.12 75);--gold-hex:#c2983a;--gold-soft:oklch(88% 0.06 80);--sage:oklch(65% 0.08 155);--sage-hex:#6a9e72;--cream:#f9f5eb;--cream-mid:#f0ebe0;--cream-deep:#e6e0d3;--cream-rose:oklch(96% 0.012 30);--text:#1e1d18;--text-dim:#6d6a62;--text-ghost:#a8a39a;--white-warm:#fffdf7}
*,*::before,*::after{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;font-size:16px}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
::selection{background:oklch(48% 0.17 28/0.12)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}

/* ── Topbar ── */
.topbar{position:sticky;top:0;z-index:100;padding:0 clamp(1.5rem,4vw,3rem);background:var(--cream);transition:box-shadow .4s cubic-bezier(.16,1,.3,1)}
.topbar.scrolled{box-shadow:0 1px 0 oklch(18% 0.09 275/0.06)}
.topbar-inner{display:flex;align-items:center;max-width:40rem;margin:0 auto;padding:clamp(.875rem,2vw,1.25rem) 0}
.topbar-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(1.25rem,2.5vw,1.5rem);color:var(--ink-hex);text-decoration:none;letter-spacing:-.01em;transition:opacity .2s}
.topbar-logo:hover{opacity:.7}
.topbar-logo::after{content:'';display:inline-block;width:1.75rem;height:2px;background:var(--coral-hex);margin-left:.75rem;vertical-align:middle;opacity:.6}
.topbar-spacer{flex:1}
.topbar-back{display:flex;align-items:center;gap:.25rem;font-size:.8125rem;font-weight:500;color:var(--text-ghost);text-decoration:none;padding:.25rem 0;transition:color .3s}
.topbar-back:hover{color:var(--text)}
.topbar-back .material-symbols-outlined{font-size:1.125rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(.75rem)}to{opacity:1;transform:none}}

/* ── Page ── */
.page{max-width:40rem;margin:0 auto;padding:clamp(2rem,5vw,4rem) clamp(1.5rem,4vw,3rem) 6rem}

/* ── Recipient ── */
.recipient{display:flex;align-items:center;gap:clamp(1rem,3vw,1.5rem);margin-bottom:clamp(2.5rem,6vw,4rem);opacity:0;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .1s forwards}
.recipient-avatar{width:clamp(3.5rem,8vw,4.5rem);aspect-ratio:1;border-radius:1.5rem;background:linear-gradient(135deg,var(--cream-mid),var(--cream-deep));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recipient-avatar span{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(1.25rem,2.5vw,1.75rem);color:var(--ink-hex);opacity:.2}
.recipient-info{min-width:0}
.recipient-label{font-size:.5625rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--coral-hex);margin-bottom:.25rem}
.recipient-name{font-family:'Noto Serif SC',serif;font-weight:700;font-size:clamp(1.25rem,3vw,1.625rem);color:var(--ink-hex);line-height:1.2}
.recipient-meta{font-size:.8125rem;color:var(--text-ghost);margin-top:.125rem}

/* ── Letter ── */
.letter{opacity:0;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .2s forwards}
.letter-heading{font-family:'Noto Serif SC',serif;font-weight:400;font-size:clamp(1.5rem,4vw,2.25rem);color:var(--ink-hex);line-height:1.3;margin-bottom:.5rem;letter-spacing:-.01em}
.letter-heading em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--coral-hex)}
.letter-sub{color:var(--text-ghost);font-size:.8125rem;margin-bottom:clamp(2rem,4vw,3rem)}

/* ── Compose Area ── */
.compose{position:relative;margin-bottom:1.5rem}
.compose textarea{width:100%;min-height:clamp(10rem,25vw,14rem);padding:clamp(1.5rem,3vw,2rem);background:var(--white-warm);border:none;border-radius:2rem;font-family:'Outfit',sans-serif;font-size:1rem;color:var(--text);line-height:1.8;resize:none;outline:none;transition:box-shadow .3s}
.compose textarea::placeholder{color:var(--text-ghost);font-weight:350;font-style:italic}
.compose textarea:focus{box-shadow:0 0 0 2px oklch(18% 0.09 275/0.06)}
.char-count{position:absolute;bottom:1rem;right:1.5rem;font-size:.6875rem;font-weight:600;color:var(--text-ghost);font-variant-numeric:tabular-nums;transition:color .2s}
.char-count.warn{color:var(--coral-hex)}

/* ── Prompts ── */
.prompts{margin-bottom:clamp(2rem,4vw,3rem);opacity:0;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .35s forwards}
.prompts-label{font-size:.625rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:.75rem}
.prompt-chips{display:flex;flex-wrap:wrap;gap:.5rem}
.prompt-chip{padding:.5rem 1rem;border-radius:9999px;background:var(--cream-mid);font-size:.8125rem;font-weight:450;color:var(--text-dim);cursor:pointer;transition:background .2s,color .2s,transform .2s;border:none;font-family:'Outfit',sans-serif}
.prompt-chip:hover{background:var(--cream-deep);color:var(--text)}
.prompt-chip:active{transform:scale(.96)}

/* ── Send ── */
.send-area{opacity:0;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .45s forwards}
.btn-send{display:flex;align-items:center;justify-content:center;gap:.625rem;width:100%;padding:1.125rem;border-radius:9999px;background:linear-gradient(135deg,var(--ink-hex),oklch(22% 0.12 275));color:var(--white-warm);font-family:'Outfit',sans-serif;font-weight:600;font-size:1rem;border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .4s;box-shadow:0 8px 32px oklch(18% 0.09 275/0.18)}
.btn-send::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 60%);pointer-events:none}
.btn-send:hover{transform:translateY(-2px);box-shadow:0 14px 44px oklch(18% 0.09 275/0.25)}
.btn-send:active{transform:scale(.98);transition-duration:.1s}
.btn-send:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-send .material-symbols-outlined{font-size:1.125rem}
.send-hint{font-size:.6875rem;color:var(--text-ghost);text-align:center;margin-top:.75rem}

/* ── Sent Confirmation ── */
.sent-state{display:none;text-align:center;padding:clamp(3rem,8vw,5rem) 0}
.sent-state.show{display:block}
.sent-icon{width:4.5rem;height:4.5rem;border-radius:50%;background:var(--sage-hex);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem;opacity:0;transform:scale(.5)}
.sent-state.show .sent-icon{animation:popIn .5s cubic-bezier(.16,1,.3,1) .15s forwards}
@keyframes popIn{0%{opacity:0;transform:scale(.5)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
.sent-icon .material-symbols-outlined{font-size:2rem;color:var(--white-warm);font-variation-settings:'FILL' 1}
.sent-title{font-family:'Noto Serif SC',serif;font-weight:700;font-size:clamp(1.5rem,3.5vw,2rem);color:var(--ink-hex);margin-bottom:.5rem;opacity:0}
.sent-state.show .sent-title{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .35s forwards}
.sent-desc{color:var(--text-dim);font-size:.9375rem;line-height:1.7;max-width:26ch;margin:0 auto 2rem;opacity:0}
.sent-state.show .sent-desc{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .45s forwards}
.btn-back{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;border-radius:9999px;background:var(--cream-mid);color:var(--text-dim);font-family:'Outfit',sans-serif;font-weight:600;font-size:.875rem;border:none;cursor:pointer;text-decoration:none;transition:background .2s;opacity:0}
.sent-state.show .btn-back{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .55s forwards}
.btn-back:hover{background:var(--cream-deep)}

/* ── Compose state toggle ── */
.compose-state{transition:opacity .3s}
.compose-state.hidden{display:none}

/* ── Mobile Nav ── */
.mobile-nav{display:none;position:fixed;bottom:clamp(1rem,3vw,1.5rem);left:50%;transform:translateX(-50%);z-index:100;padding:.5rem .375rem calc(.5rem + env(safe-area-inset-bottom))}
.mobile-nav-inner{display:flex;align-items:center;gap:.25rem;background:var(--ink-hex);border-radius:9999px;padding:.375rem;box-shadow:0 8px 32px oklch(18% 0.09 275/0.25),0 2px 8px oklch(18% 0.09 275/0.1)}
.nav-item{display:flex;align-items:center;justify-content:center;width:3rem;height:3rem;border-radius:50%;background:transparent;border:none;cursor:pointer;color:oklch(80% 0.02 275);transition:color .25s,background .25s,transform .25s;text-decoration:none}
.nav-item:active{transform:scale(.9)}
.nav-item .material-symbols-outlined{font-size:1.375rem}
.nav-item span:last-child{display:none}
.nav-item.active{background:oklch(25% 0.08 275);color:var(--cream)}
.nav-item.active .material-symbols-outlined{font-variation-settings:'FILL' 1}

@media(max-width:768px){
  .mobile-nav{display:block}
  .page{padding-bottom:6rem}
  .topbar-back span:last-child{display:none}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<nav class="topbar" id="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="topbar-logo">CSU Date</a>
    <span class="topbar-spacer"></span>
    <a href="dashboard.html" class="topbar-back">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>返回首页</span>
    </a>
  </div>
</nav>

<main class="page">

  <!-- Compose State -->
  <div class="compose-state" id="composeState">
    <div class="recipient">
      <div class="recipient-avatar"><span>陈</span></div>
      <div class="recipient-info">
        <div class="recipient-label">本周匹配 · 86% 契合</div>
        <div class="recipient-name">陈屿辰</div>
        <div class="recipient-meta">潇湘校区 · 大三 · 建筑学 · 8209190233@csu.edu.cn</div>
      </div>
    </div>

    <div class="letter">
      <h1 class="letter-heading">写一封<em>短信</em>，<br>给这周遇见的人</h1>
      <p class="letter-sub">只有对方也回应后，你们才能看到彼此的消息</p>
    </div>

    <div class="compose">
      <textarea id="msgInput" placeholder="你好，看到你也喜欢探索城市角落…" maxlength="200" oninput="updateCount()"></textarea>
      <span class="char-count" id="charCount">0 / 200</span>
    </div>

    <div class="prompts">
      <div class="prompts-label">不知道说什么？试试这些</div>
      <div class="prompt-chips">
        <button class="prompt-chip" onclick="usePrompt(this)">你平时在哪个图书馆自习？</button>
        <button class="prompt-chip" onclick="usePrompt(this)">看到你喜欢建筑，有没有推荐的长沙老建筑？</button>
        <button class="prompt-chip" onclick="usePrompt(this)">周末一般怎么度过？</button>
        <button class="prompt-chip" onclick="usePrompt(this)">你觉得我们最像的价值观是哪个？</button>
      </div>
    </div>

    <div class="send-area">
      <button class="btn-send" id="sendBtn" onclick="sendGreeting()" disabled>
        <span class="material-symbols-outlined">send</span>
        发送
      </button>
      <p class="send-hint">消息将在对方也打招呼后双向可见</p>
    </div>
  </div>

  <!-- Sent State -->
  <div class="sent-state" id="sentState">
    <div class="sent-icon">
      <span class="material-symbols-outlined">check</span>
    </div>
    <h2 class="sent-title">已送出</h2>
    <p class="sent-desc">你的招呼已经在路上了。如果陈屿辰也向你打了招呼，你们就能看到彼此的消息。</p>
    <a href="inbox.html" class="btn-back" style="margin-right:.5rem">
      <span class="material-symbols-outlined" style="font-size:1rem">mail</span>
      查看信箱
    </a>
    <a href="dashboard.html" class="btn-back">
      回到首页
    </a>
  </div>

</main>

<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="dashboard.html" class="nav-item">
      <span class="material-symbols-outlined">space_dashboard</span>
      <span>首页</span>
    </a>
    <a href="inbox.html" class="nav-item">
      <span class="material-symbols-outlined">mail</span>
      <span>信箱</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="material-symbols-outlined">person</span>
      <span>我的</span>
    </a>
  </div>
</nav>

<script>
// Auth guard
(function(){
  const raw=localStorage.getItem('csudate_user');
  if(!raw){window.location.href='login.html';return;}
  try{const u=JSON.parse(raw);if(!u.loggedIn)window.location.href='login.html';}
  catch(e){window.location.href='login.html';}
})();

// Scroll shadow
(function(){
  const tb=document.getElementById('topbar');
  let t=false;
  window.addEventListener('scroll',()=>{if(!t){requestAnimationFrame(()=>{tb.classList.toggle('scrolled',scrollY>8);t=false;});t=true;}},{passive:true});
})();

function updateCount(){
  const ta=document.getElementById('msgInput');
  const ct=document.getElementById('charCount');
  const len=ta.value.length;
  ct.textContent=len+' / 200';
  ct.classList.toggle('warn',len>180);
  document.getElementById('sendBtn').disabled=len===0;
}

function usePrompt(el){
  const ta=document.getElementById('msgInput');
  ta.value=el.textContent;
  ta.focus();
  updateCount();
}

function sendGreeting(){
  const msg=document.getElementById('msgInput').value.trim();
  if(!msg)return;
  const btn=document.getElementById('sendBtn');
  btn.innerHTML='<span class="material-symbols-outlined" style="animation:spin .6s linear infinite">progress_activity</span>';
  btn.disabled=true;
  const style=document.createElement('style');
  style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);

  setTimeout(()=>{
    document.getElementById('composeState').classList.add('hidden');
    const sent=document.getElementById('sentState');
    sent.classList.add('show');
  },800);
}
</script>

</body>
</html>
